################################################################################
# Namespace: production
################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    name: production
    environment: production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    # Limit resource quotas
    scheduler.alpha.kubernetes.io/defaultTolerations: "[]"
---
################################################################################
# Namespace: staging
################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    name: staging
    environment: staging
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.29
---
################################################################################
# Namespace: monitoring
################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    pod-security.kubernetes.io/enforce: privileged
---
################################################################################
# Namespace: applications
################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: applications
  labels:
    name: applications
    environment: dev
    pod-security.kubernetes.io/enforce: baseline
---
################################################################################
# Resource Quotas — Production
################################################################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: production
spec:
  hard:
    requests.cpu: "40"
    requests.memory: "80Gi"
    limits.cpu: "80"
    limits.memory: "160Gi"
    pods: "100"
    services: "20"
    persistentvolumeclaims: "20"
    secrets: "100"
    configmaps: "100"
    count/deployments.apps: "20"
---
################################################################################
# LimitRange — Production
################################################################################
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "100Gi"
      min:
        storage: "1Gi"
