# frontend Helm Chart — Default Values

# Global settings
global:
  environment: dev

# Image settings
image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

# Service settings
service:
  type: ClusterIP
  port: 80
  targetPort: 80

# Ingress settings
ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: frontend.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Deployment settings
replicaCount: 2

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# HPA settings
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# PDB settings
podDisruptionBudget:
  enabled: true
  maxUnavailable: "50%"

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}