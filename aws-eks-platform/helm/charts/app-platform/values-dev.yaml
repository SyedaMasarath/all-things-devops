# app-platform values for dev environment
global:
  environment: dev

replicaCount: 1

ingress:
  hosts:
    - host: dev-api.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: true
  minAvailable: 1