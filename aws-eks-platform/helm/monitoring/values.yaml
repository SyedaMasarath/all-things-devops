################################################################################
# kube-prometheus-stack — Production Values
# helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack
#   -f helm/monitoring/values.yaml --namespace monitoring
################################################################################

fullnameOverride: "monitoring"

################################################################################
# Global
################################################################################
global:
  rbac:
    create: true
    pspEnabled: false

################################################################################
# Prometheus Operator
################################################################################
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  nodeSelector:
    role: monitoring

  tolerations:
    - key: monitoring
      operator: Equal
      value: "true"
      effect: NoSchedule

################################################################################
# Prometheus
################################################################################
prometheus:
  prometheusSpec:
    # Scrape all ServiceMonitors regardless of label
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    retention: 15d
    retentionSize: "45GB"

    scrapeInterval: "30s"
    evaluationInterval: "30s"

    replicas: 2   # HA Prometheus

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi

    nodeSelector:
      role: monitoring

    tolerations:
      - key: monitoring
        operator: Equal
        value: "true"
        effect: NoSchedule

    podAntiAffinity: "hard"

    # PodDisruptionBudget — with 2 replicas, allow at most 1 down at a time
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # Remote write to Grafana Cloud (optional)
    # remoteWrite:
    #   - url: https://prometheus-prod-01.grafana.net/api/prom/push
    #     basicAuth:
    #       username:
    #         name: grafana-cloud-credentials
    #         key: username
    #       password:
    #         name: grafana-cloud-credentials
    #         key: password

    additionalScrapeConfigs:
      # Scrape EKS control plane metrics (if exposed)
      - job_name: "kubernetes-apiservers"
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

################################################################################
# Alertmanager
################################################################################
alertmanager:
  alertmanagerSpec:
    replicas: 2

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    nodeSelector:
      role: monitoring

    tolerations:
      - key: monitoring
        operator: Equal
        value: "true"
        effect: NoSchedule

    # PodDisruptionBudget — keep at least 1 Alertmanager replica available
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack/url

    route:
      group_by: ["namespace", "alertname", "cluster", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-critical"
      routes:
        - match:
            severity: critical
          receiver: "pagerduty-critical"
          continue: true
        - match:
            severity: warning
          receiver: "slack-warning"

    receivers:
      - name: "slack-critical"
        slack_configs:
          - channel: "#alerts-critical"
            send_resolved: true
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'

      - name: "slack-warning"
        slack_configs:
          - channel: "#alerts-warning"
            send_resolved: true

      - name: "pagerduty-critical"
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/pagerduty/key
            description: '{{ template "pagerduty.default.description" . }}'

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname", "cluster", "service"]

################################################################################
# Grafana
################################################################################
grafana:
  enabled: true
  replicas: 2

  adminUser: admin
  adminPassword: ""  # Set via secret

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  nodeSelector:
    role: monitoring

  tolerations:
    - key: monitoring
      operator: Equal
      value: "true"
      effect: NoSchedule

  # PodDisruptionBudget — keep at least 1 Grafana replica available
  podDisruptionBudget:
    minAvailable: 1

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  # Auto-discover dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource

  grafana.ini:
    server:
      root_url: https://grafana.your-domain.com
    auth:
      disable_login_form: false
    auth.github:
      enabled: true
      allow_sign_up: true
      client_id: "${GITHUB_CLIENT_ID}"
      client_secret: "${GITHUB_CLIENT_SECRET}"
      allowed_organizations: "your-org"
    analytics:
      check_for_updates: false
      reporting_enabled: false
    security:
      cookie_secure: true
      strict_transport_security: true

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    hosts:
      - grafana.your-domain.com
    tls: []

  # Pre-configured dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "platform"
          orgId: 1
          folder: "Platform"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/platform

  dashboards:
    platform:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      eks-cluster:
        gnetId: 17119
        revision: 1
        datasource: Prometheus

################################################################################
# Node Exporter
################################################################################
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

################################################################################
# Kube State Metrics
################################################################################
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

################################################################################
# Default PrometheusRules (alerting)
################################################################################
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Managed EKS doesn't expose etcd
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false  # EKS manages kube-proxy
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
