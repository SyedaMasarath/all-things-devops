name: "Build & Push"

on:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
    paths-ignore:
      - "terraform/**"
      - "kubernetes/**"
      - "helm/**"
      - "docs/**"
      - "*.md"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "terraform/**"
      - "kubernetes/**"

permissions:
  id-token: write
  contents: read
  security-events: write  # For CodeQL SARIF upload

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # Code quality checks run in parallel with build
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: services/api/go.mod

      - name: Go Vet (static analysis)
        run: go vet ./...
        working-directory: services/api

      - name: Run Unit Tests
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out
        working-directory: services/api

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/api/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  # Trivy vulnerability scan on source code
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"   # Don't block, just report

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  build-push:
    name: Build & Push → ECR
    runs-on: ubuntu-latest
    needs: [lint-test]
    # Only push on non-PR events
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        service:
          - name: api-service
            dockerfile: services/api/Dockerfile
            context: services/api
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          role-session-name: github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}
          tags: |
            # Semver tags: v1.2.3 → 1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Branch + short SHA for non-tag pushes
            type=ref,event=branch,suffix=-${{ github.sha }}
            type=sha,prefix=sha-,format=short

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          # Multi-platform build for ARM compatibility
          platforms: linux/amd64,linux/arm64

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/${{ matrix.service.name }}:sha-${{ github.sha }}"
          format: "table"
          exit-code: "1"          # Block on CRITICAL
          ignore-unfixed: true
          severity: "CRITICAL"
