################################################################################
# nginx configuration — frontend
#
# Responsibilities:
#   1. Serve static files from /usr/share/nginx/html
#   2. Proxy /api/ requests → api-service Kubernetes service
#   3. Expose /health for Kubernetes readiness/liveness probes
#   4. Security headers on all responses
################################################################################

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ── Static assets (aggressive caching for versioned files) ───────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Health probe endpoint (used by K8s probes and Docker HEALTHCHECK) ────
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── API proxy → api-service Kubernetes Service ───────────────────────────
    # In the cluster, "api-service" resolves to the Kubernetes Service.
    # The port (80) matches the Service's .spec.ports[0].port in the Helm chart.
    location /api/ {
        proxy_pass         http://api-service:80/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # ── SPA fallback (serve index.html for all non-file routes) ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable access to hidden files (.git, .env, etc.) ────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
